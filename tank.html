<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>三多魚缸 - 藝廊互動版</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { 
      margin: 0; padding: 0; overflow: hidden; 
      background-color: #e0e0e0; 
      display: flex; justify-content: center; align-items: center; height: 100vh;
    }
    #nav { position: fixed; top: 10px; left: 10px; z-index: 9999; }
    #nav button { 
      padding: 10px 15px; background: rgba(0, 0, 0, 0.3); color: white; 
      border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 5px; 
      cursor: pointer; font-size: 14px; transition: 0.3s;
    }
    #nav button:hover { background: rgba(0, 0, 0, 0.8); }
  </style>
</head>
<body>
  <div id="nav">
    <button onclick="location.href='index.html'">🏠 離開魚缸</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQvX-H_SmO44BVecOOEjghfBrlycbvh4s",
      authDomain: "sanduo-fish.firebaseapp.com",
      databaseURL: "https://sanduo-fish-default-rtdb.firebaseio.com",
      projectId: "sanduo-fish",
      storageBucket: "sanduo-fish.firebasestorage.app",
      messagingSenderId: "542464179839",
      appId: "1:542464179839:web:bad971b3c2bfc2cf894a"
    };
    firebase.initializeApp(firebaseConfig);
    const fishRef = firebase.database().ref('fishes');

    let allFishes = [];
    let fishStates = [];
    const TARGET_SIZE = 180; 
    const margin = 60; 

    function setup() {
      createCanvas(windowWidth, windowHeight);
      fishRef.limitToLast(30).on('child_added', (snapshot) => {
        let data = snapshot.val();
        if (data.path) { data.strokes = [{ points: data.path, color: data.color || '#333' }]; }
        
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        data.strokes.forEach(s => {
          s.points.forEach(p => {
            minX = min(minX, p.x); maxX = max(maxX, p.x);
            minY = min(minY, p.y); maxY = max(maxY, p.y);
          });
        });

        let origW = maxX - minX, origH = maxY - minY;
        let scaleFactor = TARGET_SIZE / max(origW, origH, 1);

        allFishes.push({
          data: data,
          scale: scaleFactor,
          centerX: (minX + maxX) / 2,
          centerY: (minY + maxY) / 2
        });

        fishStates.push({ 
          offX: random(margin + 100, width - margin - 100), 
          offY: random(margin + 100, height - margin - 100), 
          vx: random(-1.2, 1.2), 
          vy: random(-0.6, 0.6),
          isScared: false
        });
      });
    }

    function draw() {
      background(230); 

      // 1. 畫出大畫框底色與框
      fill(250, 248, 240); 
      stroke(100, 80, 60); 
      strokeWeight(margin); 
      rect(margin/2, margin/2, width - margin, height - margin, 10);

      // 2. 繪製魚兒
      for (let i = 0; i < allFishes.length; i++) {
        let fish = allFishes[i], state = fishStates[i];
        state.offX += state.vx; 
        state.offY += state.vy;

        if (state.offX < margin + 50 || state.offX > width - margin - 50) state.vx *= -1;
        if (state.offY < margin + 50 || state.offY > height - margin - 50) state.vy *= -1;

        push();
        translate(state.offX, state.offY);
        if (state.vx < 0) scale(-1, 1);
        scale(fish.scale);
        translate(-fish.centerX, -fish.centerY);

        for (let s of fish.data.strokes) {
          let c = color(s.color);
          
          // 【核心修正：色彩判定邏輯】
          // 只有當「紅、綠、藍」三色都非常高（接近純白）時，才轉為深灰色
          if (red(c) > 240 && green(c) > 240 && blue(c) > 240) {
            stroke(80); 
          } else {
            stroke(s.color);
          }
          
          strokeWeight(state.isScared ? 8 / fish.scale : 5 / fish.scale); 
          noFill();
          beginShape();
          for (let p of s.points) vertex(p.x, p.y);
          endShape();
        }
        pop();
      }
      
      // 3. 畫框裝飾陰影
      noFill();
      stroke(0, 0, 0, 30);
      strokeWeight(5);
      rect(margin/2, margin/2, width - margin, height - margin, 10);
    }

    function mousePressed() {
      for (let i = 0; i < allFishes.length; i++) {
        let state = fishStates[i];
        let d = dist(mouseX, mouseY, state.offX, state.offY);
        if (d < TARGET_SIZE / 2 && !state.isScared) scareFish(i);
      }
    }

    function scareFish(index) {
      let state = fishStates[index];
      state.isScared = true;
      let oldVx = state.vx; let oldVy = state.vy;
      state.vx *= 5; state.vy *= 5;
      setTimeout(() => {
        state.vx = oldVx; state.vy = oldVy; state.isScared = false;
      }, 5000);
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
