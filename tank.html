<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>三多魚缸 - 藝廊互動拖移版</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { 
      margin: 0; padding: 0; overflow: hidden; background-color: #e0e0e0; 
      display: flex; justify-content: center; align-items: center; height: 100vh;
      touch-action: none;
    }
    #nav { position: fixed; top: 10px; left: 10px; z-index: 9999; }
    #nav button { 
      padding: 10px 15px; background: rgba(0, 0, 0, 0.3); color: white; 
      border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 5px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="nav"><button onclick="location.href='index.html'">🏠 離開魚缸</button></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQvX-H_SmO44BVecOOEjghfBrlycbvh4s",
      authDomain: "sanduo-fish.firebaseapp.com",
      databaseURL: "https://sanduo-fish-default-rtdb.firebaseio.com",
      projectId: "sanduo-fish",
      storageBucket: "sanduo-fish.firebasestorage.app",
      messagingSenderId: "542464179839",
      appId: "1:542464179839:web:bad971b3c2bfc2cf894a"
    };
    firebase.initializeApp(firebaseConfig);
    const fishRef = firebase.database().ref('fishes');

    let allFishes = [];
    let fishStates = [];
    const TARGET_SIZE = 180; 
    const margin = 60; 
    let draggingFish = null;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      fishRef.limitToLast(30).on('child_added', (snapshot) => {
        let data = snapshot.val();
        
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        data.strokes.forEach(s => {
          s.points.forEach(p => {
            minX = min(minX, p.x); maxX = max(maxX, p.x);
            minY = min(minY, p.y); maxY = max(maxY, p.y);
          });
        });

        let origW = maxX - minX, origH = maxY - minY;
        let scaleFactor = TARGET_SIZE / max(origW, origH, 1);

        allFishes.push({
          data: data,
          scale: scaleFactor,
          centerX: (minX + maxX) / 2,
          centerY: (minY + maxY) / 2,
          owner: data.owner || "小畫家" // 讀取名字
        });

        fishStates.push({ 
          offX: random(margin + 100, width - margin - 100), 
          offY: random(margin + 100, height - margin - 100), 
          vx: random(-1.2, 1.2), vy: random(-0.5, 0.5),
          isDragging: false
        });
      });
    }

    function draw() {
      background(230); 
      fill(250, 248, 240); stroke(100, 80, 60); strokeWeight(margin); 
      rect(margin/2, margin/2, width - margin, height - margin, 10);

      for (let i = 0; i < allFishes.length; i++) {
        let fish = allFishes[i], state = fishStates[i];
        
        if (!state.isDragging) {
          state.offX += state.vx; state.offY += state.vy;
          if (state.offX < margin + 50 || state.offX > width - margin - 50) state.vx *= -1;
          if (state.offY < margin + 50 || state.offY > height - margin - 50) state.vy *= -1;
        } else {
          state.offX = mouseX; state.offY = mouseY;
        }

        push();
        translate(state.offX, state.offY);

        // 畫出主人名字 (呈現在魚的下方)
        push();
        textAlign(CENTER);
        textSize(16);
        noStroke();
        fill(100, 100, 100);
        text(fish.owner, 0, (TARGET_SIZE/2) + 25);
        pop();

        if (state.vx < 0) scale(-1, 1);
        scale(fish.scale);
        translate(-fish.centerX, -fish.centerY);

        for (let s of fish.data.strokes) {
          let c = color(s.color);
          if (red(c) > 240 && green(c) > 240 && blue(c) > 240) stroke(80); 
          else stroke(s.color);
          strokeWeight(state.isDragging ? 10 / fish.scale : 5 / fish.scale); 
          noFill();
          beginShape();
          for (let p of s.points) vertex(p.x, p.y);
          endShape();
        }
        pop();
      }
      noFill(); stroke(0, 0, 0, 30); strokeWeight(5);
      rect(margin/2, margin/2, width - margin, height - margin, 10);
    }

    function mousePressed() {
      for (let i = allFishes.length - 1; i >= 0; i--) {
        let state = fishStates[i];
        if (dist(mouseX, mouseY, state.offX, state.offY) < TARGET_SIZE / 2) {
          state.isDragging = true; draggingFish = i; break;
        }
      }
    }
    function mouseReleased() { if (draggingFish !== null) { fishStates[draggingFish].isDragging = false; draggingFish = null; } }
    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
