<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>大魚缸 - 三多郵局教保中心</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style> body { margin: 0; padding: 0; overflow: hidden; background: #001b33; } </style>
</head>
<body>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQvX-H_SmO44BVecOOEjghfBrlycbvh4s",
      authDomain: "sanduo-fish.firebaseapp.com",
      databaseURL: "https://sanduo-fish-default-rtdb.firebaseio.com",
      projectId: "sanduo-fish",
      storageBucket: "sanduo-fish.firebasestorage.app",
      messagingSenderId: "542464179839",
      appId: "1:542464179839:web:bad971b3c2bfc2cf894a"
    };
    firebase.initializeApp(firebaseConfig);
    const fishRef = firebase.database().ref('fishes');

    let allFishes = [];
    let fishPositions = [];
    const TARGET_SIZE = 180; // 約 5cm 的像素大小

    function setup() {
      createCanvas(windowWidth, windowHeight);
      fishRef.limitToLast(30).on('child_added', (snapshot) => {
        let data = snapshot.val();
        if (data.path) { data.strokes = [{ points: data.path, color: data.color || '#fff' }]; }
        
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        data.strokes.forEach(s => {
          s.points.forEach(p => {
            minX = min(minX, p.x); maxX = max(maxX, p.x);
            minY = min(minY, p.y); maxY = max(maxY, p.y);
          });
        });

        let origW = maxX - minX, origH = maxY - minY;
        let scaleFactor = TARGET_SIZE / max(origW, origH, 1);

        allFishes.push({
          data: data,
          scale: scaleFactor,
          centerX: (minX + maxX) / 2,
          centerY: (minY + maxY) / 2
        });
        fishPositions.push({ offX: random(width), offY: random(height), vx: random(-1.2, 1.2), vy: random(-0.5, 0.5) });
      });
    }

    function draw() {
      background(0, 27, 51);
      for (let i = 0; i < allFishes.length; i++) {
        let fish = allFishes[i], pos = fishPositions[i];
        pos.offX += pos.vx; pos.offY += pos.vy;

        if (pos.offX < -50 || pos.offX > width + 50) pos.vx *= -1;
        if (pos.offY < -50 || pos.offY > height + 50) pos.vy *= -1;

        push();
        translate(pos.offX, pos.offY);
        if (pos.vx < 0) scale(-1, 1);
        scale(fish.scale);
        translate(-fish.centerX, -fish.centerY);

        for (let s of fish.data.strokes) {
          stroke(s.color); strokeWeight(5 / fish.scale); noFill();
          beginShape();
          for (let p of s.points) vertex(p.x, p.y); // 純漂浮，無扭動
          endShape();
        }
        pop();
      }
    }
    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
