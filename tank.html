<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>三多魚缸 - 大畫框藝廊版</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
      background-color: #e0e0e0; /* 牆壁顏色：淺灰色 */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
  </style>
</head>
<body>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQvX-H_SmO44BVecOOEjghfBrlycbvh4s",
      authDomain: "sanduo-fish.firebaseapp.com",
      databaseURL: "https://sanduo-fish-default-rtdb.firebaseio.com",
      projectId: "sanduo-fish",
      storageBucket: "sanduo-fish.firebasestorage.app",
      messagingSenderId: "542464179839",
      appId: "1:542464179839:web:bad971b3c2bfc2cf894a"
    };
    firebase.initializeApp(firebaseConfig);
    const fishRef = firebase.database().ref('fishes');

    let allFishes = [];
    let fishPositions = [];
    const TARGET_SIZE = 180; // 約 5cm
    const margin = 60; // 邊框的厚度

    function setup() {
      createCanvas(windowWidth, windowHeight);
      fishRef.limitToLast(30).on('child_added', (snapshot) => {
        let data = snapshot.val();
        if (data.path) { data.strokes = [{ points: data.path, color: data.color || '#333' }]; }
        
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        data.strokes.forEach(s => {
          s.points.forEach(p => {
            minX = min(minX, p.x); maxX = max(maxX, p.x);
            minY = min(minY, p.y); maxY = max(maxY, p.y);
          });
        });

        let origW = maxX - minX, origH = maxY - minY;
        let scaleFactor = TARGET_SIZE / max(origW, origH, 1);

        allFishes.push({
          data: data,
          scale: scaleFactor,
          centerX: (minX + maxX) / 2,
          centerY: (minY + maxY) / 2
        });
        // 初始位置設定在框框內
        fishPositions.push({ 
          offX: random(margin + 100, width - margin - 100), 
          offY: random(margin + 100, height - margin - 100), 
          vx: random(-1.2, 1.2), 
          vy: random(-0.6, 0.6) 
        });
      });
    }

    function draw() {
      // 1. 畫出背景 (模擬牆面)
      background(230); 

      // 2. 畫出「大畫框」內部的畫布區域
      fill(250, 248, 240); // 畫布顏色：溫潤米白
      stroke(100, 80, 60); // 畫框顏色：深木頭色
      strokeWeight(margin); // 邊框寬度
      rect(margin/2, margin/2, width - margin, height - margin, 10);

      // 3. 繪製魚兒 (限制在框內游動)
      for (let i = 0; i < allFishes.length; i++) {
        let fish = allFishes[i], pos = fishPositions[i];
        pos.offX += pos.vx; pos.offY += pos.vy;

        // --- 碰撞偵測 (碰到大畫框邊界就反彈) ---
        // 左右反彈
        if (pos.offX < margin + 50 || pos.offX > width - margin - 50) {
          pos.vx *= -1;
        }
        // 上下反彈
        if (pos.offY < margin + 50 || pos.offY > height - margin - 50) {
          pos.vy *= -1;
        }

        push();
        translate(pos.offX, pos.offY);
        
        if (pos.vx < 0) scale(-1, 1);
        scale(fish.scale);
        translate(-fish.centerX, -fish.centerY);

        for (let s of fish.data.strokes) {
          // 防呆：太淺的顏色轉深，避免在米白畫布上看不見
          let c = color(s.color);
          if (brightness(c) > 95) stroke(80); 
          else stroke(s.color);
          
          strokeWeight(5 / fish.scale); 
          noFill();
          beginShape();
          for (let p of s.points) vertex(p.x, p.y);
          endShape();
        }
        pop();
      }
      
      // 4. 裝飾：在畫框邊角加一點陰影感
      noFill();
      stroke(0, 0, 0, 30);
      strokeWeight(5);
      rect(margin/2, margin/2, width - margin, height - margin, 10);
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
