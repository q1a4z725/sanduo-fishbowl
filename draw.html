<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>彩色畫魚室 - 三多郵局教保中心</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #ffffff; touch-action: none; -webkit-user-select: none; }
    #ui-container { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
    #palette { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); pointer-events: auto; }
    .color-btn { width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; cursor: pointer; }
    .color-btn.active { transform: scale(1.2); border: 3px solid #333; }
    #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; pointer-events: auto; }
    #nav { position: absolute; top: 15px; left: 15px; pointer-events: auto; }
    button { padding: 10px 18px; font-size: 16px; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-weight: bold; }
    .btn-home { background: #607d8b; color: white; }
    .btn-clear { background: #f44336; color: white; }
    .btn-send { background: #4CAF50; color: white; }
  </style>
</head>
<body>

  <div id="ui-container">
    <div id="nav"><button class="btn-home" onclick="location.href='index.html'">🏠</button></div>
    <div id="palette">
      <div class="color-btn active" style="background: #0066cc;" onclick="changeColor('#0066cc', this)"></div>
      <div class="color-btn" style="background: #ff4444;" onclick="changeColor('#ff4444', this)"></div>
      <div class="color-btn" style="background: #ffbb00;" onclick="changeColor('#ffbb00', this)"></div>
      <div class="color-btn" style="background: #44bb44;" onclick="changeColor('#44bb44', this)"></div>
      <div class="color-btn" style="background: #9933cc;" onclick="changeColor('#9933cc', this)"></div>
      <div class="color-btn" style="background: #333333;" onclick="changeColor('#333333', this)"></div>
    </div>
    <div id="controls">
      <button class="btn-clear" id="clearBtn">重畫</button>
      <button class="btn-send" id="sendBtn">畫好了！送出 ➔</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQvX-H_SmO44BVecOOEjghfBrlycbvh4s",
      authDomain: "sanduo-fish.firebaseapp.com",
      databaseURL: "https://sanduo-fish-default-rtdb.firebaseio.com",
      projectId: "sanduo-fish",
      storageBucket: "sanduo-fish.firebasestorage.app",
      messagingSenderId: "542464179839",
      appId: "1:542464179839:web:bad971b3c2bfc2cf894a"
    };
    firebase.initializeApp(firebaseConfig);
    const fishRef = firebase.database().ref('fishes');

    let allStrokes = []; 
    let currentStroke = [];
    let currentColor = '#0066cc';
    let isDrawing = false;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.mousePressed(startStroke);
    }

    function changeColor(c, el) {
      currentColor = c;
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }

    function startStroke() {
      // 只有點擊畫布空白處才開始畫，避開 UI 區
      if (mouseY > 80 && mouseY < height - 80) {
        isDrawing = true;
        currentStroke = [];
      }
    }

    function draw() {
      background(255);
      
      // 畫出已完成筆劃
      for (let s of allStrokes) {
        stroke(s.color);
        strokeWeight(6);
        noFill();
        beginShape();
        for (let p of s.points) vertex(p.x, p.y);
        endShape();
      }

      // 畫出當前筆劃
      if (isDrawing && mouseIsPressed) {
        currentStroke.push({x: mouseX, y: mouseY});
        stroke(currentColor);
        strokeWeight(6);
        noFill();
        beginShape();
        for (let p of currentStroke) vertex(p.x, p.y);
        endShape();
      }
    }

    function mouseReleased() {
      if (isDrawing && currentStroke.length > 2) {
        allStrokes.push({ points: currentStroke, color: currentColor });
      }
      isDrawing = false;
      currentStroke = [];
    }

    document.getElementById('clearBtn').onclick = (e) => { allStrokes = []; e.stopPropagation(); };
    document.getElementById('sendBtn').onclick = (e) => {
      if (allStrokes.length > 0) {
        fishRef.push({ strokes: allStrokes, timestamp: Date.now() });
        allStrokes = [];
        alert("魚兒游走囉！");
      }
      e.stopPropagation();
    };

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
