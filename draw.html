<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>畫魚室 - 穩定測試版</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #ffffff; touch-action: none; }
    #ui { position: fixed; top: 10px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 1000; }
    #bottom-ui { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 1000; }
    .c-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ccc; }
    button { padding: 10px 15px; font-size: 16px; border-radius: 5px; border: none; background: #4CAF50; color: white; }
  </style>
</head>
<body>

  <div id="ui">
    <div class="c-btn" style="background:#0066cc" onclick="currentColor='#0066cc'"></div>
    <div class="c-btn" style="background:#ff4444" onclick="currentColor='#ff4444'"></div>
    <div class="c-btn" style="background:#ffbb00" onclick="currentColor='#ffbb00'"></div>
    <div class="c-btn" style="background:#44bb44" onclick="currentColor='#44bb44'"></div>
  </div>

  <div id="bottom-ui">
    <button onclick="allStrokes=[];">重畫</button>
    <button onclick="sendFish()" style="background:#2196F3">送出魚兒</button>
    <button onclick="location.href='index.html'" style="background:#666">回選單</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQvX-H_SmO44BVecOOEjghfBrlycbvh4s",
      authDomain: "sanduo-fish.firebaseapp.com",
      databaseURL: "https://sanduo-fish-default-rtdb.firebaseio.com",
      projectId: "sanduo-fish",
      storageBucket: "sanduo-fish.firebasestorage.app",
      messagingSenderId: "542464179839",
      appId: "1:542464179839:web:bad971b3c2bfc2cf894a"
    };
    firebase.initializeApp(firebaseConfig);
    const fishRef = firebase.database().ref('fishes');

    let allStrokes = [];
    let currentStroke = [];
    let currentColor = '#0066cc';

    function setup() {
      createCanvas(windowWidth, windowHeight);
    }

    function draw() {
      background(255);
      // 畫出所有已存筆劃
      for (let s of allStrokes) {
        stroke(s.color);
        strokeWeight(5);
        noFill();
        beginShape();
        for (let p of s.points) vertex(p.x, p.y);
        endShape();
      }
      // 畫出正在畫的筆劃
      if (currentStroke.length > 0) {
        stroke(currentColor);
        strokeWeight(5);
        noFill();
        beginShape();
        for (let p of currentStroke) vertex(p.x, p.y);
        endShape();
      }
    }

    // --- 關鍵修復：同時支援滑鼠與觸控 ---
    function touchStarted() {
      if (mouseY > 60 && mouseY < height - 80) {
        currentStroke = [];
        return false; // 防止瀏覽器預設行為
      }
    }

    function touchMoved() {
      if (mouseY > 60 && mouseY < height - 80) {
        currentStroke.push({x: mouseX, y: mouseY});
        return false;
      }
    }

    function touchEnded() {
      if (currentStroke.length > 2) {
        allStrokes.push({ points: currentStroke, color: currentColor });
      }
      currentStroke = [];
      return false;
    }

    function sendFish() {
      if (allStrokes.length > 0) {
        fishRef.push({ strokes: allStrokes, timestamp: Date.now() });
        allStrokes = [];
        alert("成功送出！");
      }
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
