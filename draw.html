<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>畫魚室(修正版) - 三多郵局教保中心</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #ffffff; touch-action: none; }
    #ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; }
    #nav { position: fixed; top: 15px; left: 15px; z-index: 100; }
    button { padding: 12px 20px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn-home { background: #607d8b; color: white; }
    .btn-clear { background: #f44336; color: white; }
    .btn-send { background: #4CAF50; color: white; font-weight: bold; }
  </style>
</head>
<body>
  <div id="nav">
    <button class="btn-home" onclick="location.href='index.html'">🏠 回選單</button>
  </div>
  <div id="ui">
    <button class="btn-clear" id="clearBtn">重畫</button>
    <button class="btn-send" id="sendBtn">畫好了！送出 ➔</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQvX-H_SmO44BVecOOEjghfBrlycbvh4s",
      authDomain: "sanduo-fish.firebaseapp.com",
      databaseURL: "https://sanduo-fish-default-rtdb.firebaseio.com",
      projectId: "sanduo-fish",
      storageBucket: "sanduo-fish.firebasestorage.app",
      messagingSenderId: "542464179839",
      appId: "1:542464179839:web:bad971b3c2bfc2cf894a"
    };

    firebase.initializeApp(firebaseConfig);
    const fishRef = firebase.database().ref('fishes');

    let allStrokes = []; 
    let currentStroke = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
    }

    function draw() {
      background(255);
      stroke(0, 102, 204);
      strokeWeight(5);
      noFill();

      // 畫出舊的筆劃
      for (let s of allStrokes) {
        beginShape();
        for (let p of s) vertex(p.x, p.y);
        endShape();
      }

      // 畫出現在這一筆
      if (mouseIsPressed && mouseY < height - 80) { // 限制：如果太靠近底部按鈕區，就不畫
        currentStroke.push({x: mouseX, y: mouseY});
        beginShape();
        for (let p of currentStroke) vertex(p.x, p.y);
        endShape();
      }
    }

    // 只有在滑鼠放開且不是在按鈕上時，才存入筆劃
    function mouseReleased() {
      if (currentStroke.length > 2 && mouseY < height - 80) {
        allStrokes.push(currentStroke);
      }
      currentStroke = [];
    }

    document.getElementById('clearBtn').onclick = () => { allStrokes = []; };

    document.getElementById('sendBtn').onclick = function() {
      if (allStrokes.length > 0) {
        let combinedPath = [];
        for(let s of allStrokes) combinedPath = combinedPath.concat(s);

        fishRef.push({
          path: combinedPath,
          color: `rgb(${floor(random(100,255))}, ${floor(random(50,150))}, 50)`,
          timestamp: Date.now()
        });
        allStrokes = [];
        alert("魚兒游走囉！");
      }
    };
    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
