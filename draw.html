<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>彩色畫魚室 - 三多郵局教保中心</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #ffffff; touch-action: none; -webkit-user-select: none; }
    /* 這裡不再需要 fixed 的按鈕，我們全部畫在畫布上 */
  </style>
</head>
<body>

  <script>
    // --- Firebase 配置 ---
    const firebaseConfig = {
      apiKey: "AIzaSyBQvX-H_SmO44BVecOOEjghfBrlycbvh4s",
      authDomain: "sanduo-fish.firebaseapp.com",
      databaseURL: "https://sanduo-fish-default-rtdb.firebaseio.com",
      projectId: "sanduo-fish",
      storageBucket: "sanduo-fish.firebasestorage.app",
      messagingSenderId: "542464179839",
      appId: "1:542464179839:web:bad971b3c2bfc2cf894a"
    };
    firebase.initializeApp(firebaseConfig);
    const fishRef = firebase.database().ref('fishes');

    let allStrokes = []; 
    let currentStroke = [];
    let colors = ['#0066cc', '#ff4444', '#ffbb00', '#44bb44', '#9933cc', '#333333'];
    let selectedIndex = 0; 
    let isDrawing = false;

    function setup() {
      createCanvas(windowWidth, windowHeight);
    }

    function draw() {
      background(255);
      
      // 1. 畫出調色盤 (位於上方)
      for (let i = 0; i < colors.length; i++) {
        let x = width / 2 - 125 + i * 50;
        let y = 45;
        noStroke();
        fill(colors[i]);
        ellipse(x, y, 40, 40);
        if (selectedIndex === i) {
          noFill();
          stroke(80); 
          strokeWeight(3);
          ellipse(x, y, 48, 48);
          noStroke();
        }
      }

      // 2. 畫出三個功能按鈕 (位於下方)
      noStroke();
      let btnY = height - 65;
      let btnW = 95;
      let btnH = 45;

      // 🏠 回選單 (灰色)
      fill(96, 125, 139); 
      rect(width / 2 - 155, btnY, btnW, btnH, 25);
      
      // 🔄 全部重畫 (紅色)
      fill(244, 67, 54); 
      rect(width / 2 - 47, btnY, btnW, btnH, 25);
      
      // ✅ 畫好送出 (綠色)
      fill(76, 175, 80); 
      rect(width / 2 + 60, btnY, btnW, btnH, 25);
      
      // 按鈕文字
      fill(255);
      textAlign(CENTER, CENTER);
      textSize(15);
      text("🏠 回選單", width / 2 - 107, height - 42);
      text("全部重畫", width / 2, height - 42);
      text("畫好送出", width / 2 + 107, height - 42);

      // 3. 畫出畫作
      noFill();
      for (let s of allStrokes) {
        stroke(s.color); strokeWeight(6);
        beginShape();
        for (let p of s.points) vertex(p.x, p.y);
        endShape();
      }

      if (isDrawing) {
        stroke(colors[selectedIndex]); strokeWeight(6);
        beginShape();
        for (let p of currentStroke) vertex(p.x, p.y);
        endShape();
      }
    }

    function touchStarted() {
      // 點擊調色盤
      for (let i = 0; i < colors.length; i++) {
        let x = width / 2 - 125 + i * 50;
        if (dist(mouseX, mouseY, x, 45) < 25) {
          selectedIndex = i;
          return false;
        }
      }

      // 點擊下方按鈕區域
      if (mouseY > height - 70) {
        // 點擊：回選單
        if (mouseX > width/2 - 155 && mouseX < width/2 - 60) {
          location.href = 'index.html';
        } 
        // 點擊：全部重畫
        else if (mouseX > width/2 - 47 && mouseX < width/2 + 48) {
          allStrokes = [];
        } 
        // 點擊：畫好送出
        else if (mouseX > width/2 + 60 && mouseX < width/2 + 155) {
          if (allStrokes.length > 0) {
            fishRef.push({ strokes: allStrokes, timestamp: Date.now() });
            allStrokes = [];
            alert("魚兒游走囉！");
          }
        }
        return false;
      }

      // 繪圖區域判定
      if (mouseY > 90 && mouseY < height - 90) {
        isDrawing = true;
        currentStroke = [];
      }
      return false;
    }

    function touchMoved() {
      if (isDrawing) currentStroke.push({x: mouseX, y: mouseY});
      return false;
    }

    function touchEnded() {
      if (isDrawing && currentStroke.length > 2) {
        allStrokes.push({ points: currentStroke, color: colors[selectedIndex] });
      }
      isDrawing = false;
      currentStroke = [];
      return false;
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
