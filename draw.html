<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>大魚缸 - 三多郵局教保中心</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style> body { margin: 0; padding: 0; overflow: hidden; background: #001b33; } </style>
</head>
<body>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQvX-H_SmO44BVecOOEjghfBrlycbvh4s",
      authDomain: "sanduo-fish.firebaseapp.com",
      databaseURL: "https://sanduo-fish-default-rtdb.firebaseio.com",
      projectId: "sanduo-fish",
      storageBucket: "sanduo-fish.firebasestorage.app",
      messagingSenderId: "542464179839",
      appId: "1:542464179839:web:bad971b3c2bfc2cf894a"
    };
    firebase.initializeApp(firebaseConfig);
    const fishRef = firebase.database().ref('fishes');

    let allFishes = [];
    let fishPositions = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      fishRef.limitToLast(30).on('child_added', (snapshot) => {
        let data = snapshot.val();
        // 舊資料相容處理
        if (data.path) { data.strokes = [{ points: data.path, color: data.color || '#fff' }]; }
        allFishes.push(data);
        fishPositions.push({ offX: 0, offY: 0, vx: random(-1.2, 1.2), vy: random(-0.5, 0.5) });
      });
    }

    function draw() {
      background(0, 27, 51);
      for (let i = 0; i < allFishes.length; i++) {
        let fish = allFishes[i];
        let pos = fishPositions[i];
        pos.offX += pos.vx;
        pos.offY += pos.vy;

        let firstStroke = fish.strokes[0];
        let headX = firstStroke.points[0].x + pos.offX;
        let headY = firstStroke.points[0].y + pos.offY;

        if (headX < 0 || headX > width) pos.vx *= -1;
        if (headY < 0 || headY > height) pos.vy *= -1;

        push();
        translate(pos.offX, pos.offY);
        if (pos.vx < 0) { 
          translate(firstStroke.points[0].x * 2, 0); 
          scale(-1, 1); 
        }

        for (let s of fish.strokes) {
          stroke(s.color); strokeWeight(3); noFill();
          beginShape();
          for (let p of s.points) {
            vertex(p.x, p.y); // 移除了 swing 計算，魚不會再扭動
          }
          endShape();
        }
        pop();
      }
    }
    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
