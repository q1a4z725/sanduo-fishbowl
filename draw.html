<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>彩色畫魚室 - 三多郵局教保中心</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #ffffff; touch-action: none; -webkit-user-select: none; }
  </style>
</head>
<body>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQvX-H_SmO44BVecOOEjghfBrlycbvh4s",
      authDomain: "sanduo-fish.firebaseapp.com",
      databaseURL: "https://sanduo-fish-default-rtdb.firebaseio.com",
      projectId: "sanduo-fish",
      storageBucket: "sanduo-fish.firebasestorage.app",
      messagingSenderId: "542464179839",
      appId: "1:542464179839:web:bad971b3c2bfc2cf894a"
    };
    firebase.initializeApp(firebaseConfig);
    const fishRef = firebase.database().ref('fishes');

    let allStrokes = []; 
    let currentStroke = [];
    let colors = ['#0066cc', '#ff4444', '#ffbb00', '#44bb44', '#9933cc', '#333333'];
    let selectedIndex = 0; 
    let isDrawing = false;
    let nameInput; // p5.js 內建輸入元件

    function setup() {
      createCanvas(windowWidth, windowHeight);
      
      // 使用 p5.js 內建方法建立輸入框，這在觸控裝置上更穩定
      nameInput = createInput('');
      nameInput.attribute('placeholder', '請打名字');
      nameInput.attribute('maxlength', '10');
      nameInput.style('font-size', '18px');
      nameInput.style('padding', '8px');
      nameInput.style('text-align', 'center');
      nameInput.style('border', '2px solid #ddd');
      nameInput.style('border-radius', '10px');
      
      repositionUI();
    }

    function repositionUI() {
      // 動態計算輸入框位置，確保它在按鈕上方
      nameInput.position(width / 2 - 85, height - 120);
      nameInput.size(160);
    }

    function draw() {
      background(255);
      
      // 1. 調色盤 (上方)
      for (let i = 0; i < colors.length; i++) {
        let x = width / 2 - 125 + i * 50;
        let y = 45;
        noStroke();
        fill(colors[i]);
        ellipse(x, y, 40, 40);
        if (selectedIndex === i) {
          noFill(); stroke(80); strokeWeight(3);
          ellipse(x, y, 48, 48); noStroke();
        }
      }

      // 2. 下方三個功能按鈕
      noStroke();
      let btnY = height - 60;
      let btnW = 95;
      let btnH = 45;

      // 按鈕背景
      fill(96, 125, 139); rect(width / 2 - 155, btnY, btnW, btnH, 25);
      fill(244, 67, 54); rect(width / 2 - 47, btnY, btnW, btnH, 25);
      fill(76, 175, 80); rect(width / 2 + 60, btnY, btnW, btnH, 25);
      
      // 按鈕文字
      fill(255); textAlign(CENTER, CENTER); textSize(15);
      text("🏠 回選單", width / 2 - 107, btnY + 23);
      text("全部重畫", width / 2, btnY + 23);
      text("畫好送出", width / 2 + 107, btnY + 23);

      // 3. 繪製畫作
      noFill();
      for (let s of allStrokes) {
        stroke(s.color); strokeWeight(6);
        beginShape();
        for (let p of s.points) vertex(p.x, p.y);
        endShape();
      }
      if (isDrawing) {
        stroke(colors[selectedIndex]); strokeWeight(6);
        beginShape();
        for (let p of currentStroke) vertex(p.x, p.y);
        endShape();
      }
    }

    // 使用 mousePressed 作為通用觸發，解決 touchStarted 在某些瀏覽器按不到的問題
    function mousePressed() {
      // 點擊調色盤
      for (let i = 0; i < colors.length; i++) {
        let x = width / 2 - 125 + i * 50;
        if (dist(mouseX, mouseY, x, 45) < 25) {
          selectedIndex = i; return;
        }
      }

      // 點擊按鈕 (明確偵測範圍)
      if (mouseY > height - 70) {
        // 回選單
        if (mouseX > width/2 - 155 && mouseX < width/2 - 60) { 
          window.location.href = 'index.html'; 
        } 
        // 全部重畫
        else if (mouseX > width/2 - 47 && mouseX < width/2 + 48) { 
          allStrokes = []; 
        } 
        // 送出
        else if (mouseX > width/2 + 60 && mouseX < width/2 + 155) {
          let name = nameInput.value() || "小畫家";
          if (allStrokes.length > 0) {
            fishRef.push({ 
              strokes: allStrokes, 
              owner: name, 
              timestamp: Date.now() 
            });
            allStrokes = [];
            nameInput.value(""); // 清空
            alert(name + " 的魚游走囉！");
          }
        }
        return;
      }

      // 繪圖區域判定 (避開 UI)
      if (mouseY > 90 && mouseY < height - 130) {
        isDrawing = true;
        currentStroke = [];
      }
    }

    function mouseDragged() {
      if (isDrawing) {
        currentStroke.push({x: mouseX, y: mouseY});
      }
    }

    function mouseReleased() {
      if (isDrawing && currentStroke.length > 2) {
        allStrokes.push({ points: currentStroke, color: colors[selectedIndex] });
      }
      isDrawing = false;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      repositionUI();
    }
  </script>
</body>
</html>
