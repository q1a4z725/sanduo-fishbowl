<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三多魚缸 - 反彈遊動版</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #0a1e3c; }
    #ui { position: absolute; top: 15px; left: 15px; color: white; font-family: sans-serif; pointer-events: none; z-index: 10; }
  </style>
</head>
<body>
  <div id="ui"><h2>🎨 三多互動魚缸</h2><p>畫一條魚，牠會在地平線內來回遊動！</p></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQvX-H_SmO44BVecOOEjghfBrlycbvh4s",
      authDomain: "sanduo-fish.firebaseapp.com",
      databaseURL: "https://sanduo-fish-default-rtdb.firebaseio.com",
      projectId: "sanduo-fish",
      storageBucket: "sanduo-fish.firebasestorage.app",
      messagingSenderId: "542464179839",
      appId: "1:542464179839:web:bad971b3c2bfc2cf894a",
      measurementId: "G-7YE6HQX10Q"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const fishRef = database.ref('fishes');

    let myPath = [];
    let allFishes = [];
    let fishPositions = []; // 用來追蹤每條魚的即時位置

    function setup() {
      createCanvas(windowWidth, windowHeight);
      fishRef.limitToLast(20).on('child_added', (snapshot) => {
        let newFish = snapshot.val();
        allFishes.push(newFish);
        // 初始化這條魚的動態資料
        fishPositions.push({
          offX: 0, offY: 0,
          vx: random(-2, 2), 
          vy: random(-1, 1)
        });
      });
    }

    function draw() {
      background(10, 30, 60);

      for (let i = 0; i < allFishes.length; i++) {
        updateAndDrawFish(allFishes[i], i);
      }

      if (mouseIsPressed) {
        stroke(255, 255, 0);
        strokeWeight(4);
        noFill();
        beginShape();
        for (let p of myPath) vertex(p.x, p.y);
        endShape();
        myPath.push({x: mouseX, y: mouseY});
      }
    }

    function updateAndDrawFish(fish, idx) {
      let pos = fishPositions[idx];
      if (!pos) return;

      // 1. 更新位移 (修正後的算式)
      pos.offX += pos.vx;
      pos.offY += pos.vy;

      // 2. 邊界判定 (檢查魚的頭部座標加上位移後是否撞牆)
      let headX = fish.path[0].x + pos.offX;
      let headY = fish.path[0].y + pos.offY;

      if (headX < 0 || headX > width) pos.vx *= -1;
      if (headY < 0 || headY > height) pos.vy *= -1;

      // 3. 繪製
      push();
      translate(pos.offX, pos.offY);
      
      // 自動轉向：往左游時水平翻轉
      if (pos.vx < 0) {
        translate(fish.path[0].x * 2, 0);
        scale(-1, 1);
      }

      stroke(fish.color);
      strokeWeight(3);
      noFill();
      beginShape();
      for (let i = 0; i < fish.path.length; i++) {
        let swing = sin(frameCount * 0.1 + i * 0.3) * (i * 0.2);
        vertex(fish.path[i].x + swing, fish.path[i].y + swing * 0.3);
      }
      endShape();
      pop();
    }

    function mouseReleased() {
      if (myPath.length > 5) {
        fishRef.push({
          path: myPath,
          color: `rgb(${floor(random(100,255))}, ${floor(random(100,255))}, ${floor(random(100,255))})`,
          timestamp: Date.now()
        });
      }
      myPath = [];
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
